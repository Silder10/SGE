<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>Registro de Usuario — S.G.E</title>
</head>
<body>
    <main>
        <div class="auth-wrapper">
            <div class="auth-card">
                <div class="auth-header">
                    <span class="auth-logo">S.G.E</span>
                    <h1>Crear cuenta</h1>
                    <p>Completa los datos para registrarte</p>
                </div>
                <form method="POST" class="auth-form">
                    <div class="field-group">
                        <label for="username">Nombre de usuario</label>
                        <input type="text" id="username" name="username" placeholder="ej. juan_perez" required>
                    </div>
                    <div class="field-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="field-group">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres" required>
                    </div>
                    <div class="field-group">
                        <label for="rol">Rol</label>
                        <select id="rol" name="rol" required>
                            <option value="">Seleccione un rol</option>
                            <option value="asistente">Asistente</option>
                            <option value="organizador">Organizador</option>
                        </select>
                    </div>
                    <div class="field-group">
                        <label for="bio">Biografía <span class="label-hint">(opcional)</span></label>
                        <textarea id="bio" name="bio" rows="3" placeholder="Cuéntanos algo sobre ti..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Registrarse</button>
                </form>
                <div class="auth-footer">
                    <a href="{{ url_for('inicio') }}">← Volver al inicio</a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
